<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interest Rate Calculator</title>
  <meta name="description" content="A simple and fast Interest Rate Calculator to calculate simple interest based on principal, rate, and time.">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <h1>Interest Rate Calculator</h1>

  <div class="calculator">
    <label for="principal">Principal Amount</label>
    <input type="number" id="principal" placeholder="e.g. 1000">

    <label for="rate">Interest Rate (%)</label>
    <input type="number" id="rate" placeholder="e.g. 5">

    <label for="time">Time (years)</label>
    <input type="number" id="time" placeholder="e.g. 2">

    <button id="calculate-btn">Calculate</button>

    <p id="result"></p>
  </div>

  <script src="./script.js"></script>
</body>
</html>
